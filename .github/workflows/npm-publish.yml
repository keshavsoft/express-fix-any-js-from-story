# This workflow will run tests using node and then publish a package to GitHub Packages when a release is created
# For more information see: https://docs.github.com/en/actions/publishing-packages/publishing-nodejs-packages

name: Node.js Package

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      # - run: npm test

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/
      - run: npm ci
      - run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          BEFORE_VERSION=$(npm view "$PACKAGE_NAME" version 2>/dev/null || echo "None")
          
          echo "### 🚀 NPM Publication Summary" >> $GITHUB_STEP_SUMMARY
          echo "* **Package**: \`$PACKAGE_NAME\`" >> $GITHUB_STEP_SUMMARY
          echo "* **Git Repository**: <a href=\"https://github.com/${{ github.repository }}\" target=\"_blank\">https://github.com/${{ github.repository }}</a>" >> $GITHUB_STEP_SUMMARY
          echo "* **Before Publish Version**: \`$BEFORE_VERSION\`" >> $GITHUB_STEP_SUMMARY
          
          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
            echo "Version ${PACKAGE_VERSION} of ${PACKAGE_NAME} is already published on npm. Skipping publish."
            echo "* **After Publish Version**: \`$BEFORE_VERSION\`" >> $GITHUB_STEP_SUMMARY
            echo "* **Status**: ⚠️ Skipped (Version $PACKAGE_VERSION is already published on NPM)" >> $GITHUB_STEP_SUMMARY
          else
            npm publish
            echo "* **After Publish Version**: \`$PACKAGE_VERSION\`" >> $GITHUB_STEP_SUMMARY
            echo "* **Status**: ✅ Successfully Published to NPM" >> $GITHUB_STEP_SUMMARY
          fi
          echo "* **Registry Link**: <a href=\"https://www.npmjs.com/package/$PACKAGE_NAME\" target=\"_blank\">https://www.npmjs.com/package/$PACKAGE_NAME</a>" >> $GITHUB_STEP_SUMMARY
        env:
          NODE_AUTH_TOKEN: ${{secrets.NPM_TOKEN}}

  notify-dependents:
    needs: publish-npm
    uses: ./.github/workflows/notify-dependents.yml
    secrets:
      REPO_DISPATCH_TOKEN: ${{ secrets.REPO_DISPATCH_TOKEN }}

