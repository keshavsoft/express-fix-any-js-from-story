name: Notify Dependents

on:
  workflow_call:
    secrets:
      REPO_DISPATCH_TOKEN:
        required: true

jobs:
  notify-dependents:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for NPM registry replication
        run: sleep 15
      - name: Notify express-fix-endpoints-get-js
        run: |
          curl -i -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.REPO_DISPATCH_TOKEN }}" \
            https://api.github.com/repos/keshavsoft/express-fix-endpoints-get-js/dispatches \
            -d '{"event_type":"dependency-updated"}'
